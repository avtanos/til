<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TIL MVP — Задачи</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="lang-kg">
    <div class="page">
      <header class="topbar">
        <a href="index.html" class="brand">
          <img src="assets/logo.png" alt="TIL MVP — Simple UX/UI" class="brand-logo" />
          <div class="brand-copy">
            <strong>TIL MVP</strong>
            <span>Simple UX/UI</span>
          </div>
        </a>

        <div class="top-actions">
          <nav class="nav">
            <a href="index.html"><span data-lang="ru">Редактор</span><span data-lang="kg">Редактор</span></a>
            <a href="tasks.html" class="active"><span data-lang="ru">Задачи</span><span data-lang="kg">Тапшырмалар</span></a>
            <a href="semantics.html"><span data-lang="ru">Семантика</span><span data-lang="kg">Семантика</span></a>
          </nav>

          <div class="lang-switch">
            <button id="ruBtn" class="active" type="button">Русский</button>
            <button id="kgBtn" type="button">Кыргызча</button>
          </div>
        </div>
      </header>

      <header class="tasks-header">
        <h1><span data-lang="ru">Задачи</span><span data-lang="kg">Тапшырмалар</span></h1>
        <p style="color: var(--muted); margin: 8px 0 0;">
          <span data-lang="ru">20 олимпиадных задач для языка TIL</span>
          <span data-lang="kg">TIL тили үчүн 20 олимпиадалык тапшырма</span>
        </p>
      </header>

      <section class="card">
        <div class="card-body">
          <div class="task-list" id="taskList">
            <p style="color: var(--muted);"><span data-lang="ru">Загрузка...</span><span data-lang="kg">Жүктөлүүдө...</span></p>
          </div>
        </div>
      </section>
    </div>

    <script src="config.js"></script>
    <script src="lang.js"></script>
    <script src="tasks.js"></script>
  </body>
</html>
